name: Snyk
# PR gate: scans upload SARIF, Code Scanning diffs new findings and blocks.
# Each scan also renders a severity-grouped report to summary + sticky PR
# comment. Don't run alongside Snyk's native PR check (double results).
on:
  pull_request:
    branches: [ main, 'release/**' ]   # filters on the PR's TARGET branch
permissions:
  contents: read
  security-events: write   # SARIF upload to Code Scanning
  pull-requests: write     # sticky PR comments
  # actions: read          # uncomment for PRIVATE repos, upload fails without it
concurrency:
  group: snyk-gate-${{ github.ref }}
  cancel-in-progress: true
env:
  SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
  SNYK_CFG_ORG: ${{ secrets.SNYK_ORG }}   # same org secret in all 3 workflows
jobs:
  gate:
    name: ${{ matrix.name }} Scan
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: SCA
            title: SCA (open-source dependencies)
            command: snyk test
            sarif: snyk-sca.sarif
            category: snyk-sca
            extra_flags: --json-file-output=snyk-sca.json
            render_mode: sca
            render_file: snyk-sca.json
            needs_deps: true
          - name: SAST
            title: SAST (Snyk Code)
            command: snyk code test
            sarif: snyk-code.sarif
            category: snyk-code
            extra_flags: ''
            render_mode: sarif
            render_file: snyk-code.sarif
            needs_deps: false
          - name: IaC
            title: IaC (Terraform/K8s/CloudFormation)
            command: snyk iac test
            sarif: snyk-iac.sarif
            category: snyk-iac
            extra_flags: ''
            render_mode: sarif
            render_file: snyk-iac.sarif
            needs_deps: false
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: 'npm'
      - name: Install dependencies (SCA only)
        if: matrix.needs_deps
        run: npm install --ignore-scripts
      - run: npm install -g snyk

      # exit codes: 0 clean, 1 findings, 2 error, 3 nothing to scan; only 2 fails
      - name: Scan ${{ matrix.name }}
        id: scan
        continue-on-error: true
        run: |
          set +e
          ${{ matrix.command }} --sarif-file-output=${{ matrix.sarif }} ${{ matrix.extra_flags }}
          code=$?
          echo "code=$code" >> "$GITHUB_OUTPUT"
          if [ "$code" -eq 2 ]; then exit 2; fi
          exit 0

      - name: Write report renderer
        if: always()
        run: |
          cat > render.py << 'EOF'
          import json, os

          SEV_ORDER = ["critical", "high", "medium", "low"]
          SEV_ICON = {"critical": "\U0001F6A8", "high": "\U0001F534", "medium": "\U0001F7E0", "low": "\U0001F7E1"}
          SEV_LABEL = {"critical": "Critical", "high": "High", "medium": "Medium", "low": "Low"}
          LEVEL_TO_SEV = {"error": "high", "warning": "medium", "note": "low"}
          OPEN_BY_DEFAULT = {"critical", "high"}

          def load(path):
              try:
                  with open(path) as f:
                      d = json.load(f)
                  return d[0] if isinstance(d, list) and d else d
              except Exception:
                  return None

          def details_block(sev, count, table_lines):
              open_attr = " open" if sev in OPEN_BY_DEFAULT else ""
              out = [f"<details{open_attr}>", f"<summary>{SEV_ICON[sev]} <b>{SEV_LABEL[sev]}</b>: {count} issue(s)</summary>", ""]
              out += table_lines
              out += ["", "</details>", ""]
              return out

          def render_sca(path):
              d = load(path)
              if not d:
                  return ["\u26A0\uFE0F Scan produced no output. Check the step log (auth error or unsupported project)."]
              vulns = d.get("vulnerabilities") or []
              if not vulns:
                  return ["\u2705 No dependency issues found."]
              uniq = {}
              for v in vulns:
                  uniq.setdefault(v.get("id"), v)
              by_sev = {}
              for v in uniq.values():
                  by_sev.setdefault(v.get("severity", "low"), []).append(v)
              parts = " | ".join(f"{SEV_ICON[s]} {SEV_LABEL[s]}: {len(by_sev[s])}" for s in SEV_ORDER if s in by_sev)
              out = [f"**{len(uniq)} unique issues across {len(vulns)} vulnerable paths** | {parts}", ""]
              for sev in SEV_ORDER:
                  if sev not in by_sev:
                      continue
                  rows = ["| Issue | Package | Fixed in |", "|---|---|---|"]
                  for v in sorted(by_sev[sev], key=lambda x: x.get("packageName", "")):
                      fixed = ", ".join((v.get("fixedIn") or [])[:3]) or "-"
                      rows.append(f"| {v.get('title','?')} | `{v.get('packageName','?')}@{v.get('version','?')}` | `{fixed}` |")
                  out += details_block(sev, len(by_sev[sev]), rows)
              upgrades = (d.get("remediation") or {}).get("upgrade") or {}
              if upgrades:
                  rows = ["| Upgrade | To | Fixes |", "|---|---|---|"]
                  ranked = sorted(upgrades.items(), key=lambda kv: -len(kv[1].get("vulns", [])))
                  for pkg, info in ranked[:10]:
                      rows.append(f"| `{pkg}` | `{info.get('upgradeTo','?')}` | {len(info.get('vulns', []))} issues |")
                  if len(ranked) > 10:
                      rows += ["", f"...plus {len(ranked)-10} more upgrades, see the run log."]
                  out += ["<details open>", "<summary>\U0001F527 <b>Top fixes by impact</b> (bump these first)</summary>", ""]
                  out += rows + ["", "</details>", ""]
              unresolved = (d.get("remediation") or {}).get("unresolved") or []
              if unresolved:
                  out += [f"\u26A0\uFE0F {len(unresolved)} issues have **no direct upgrade** (transitive pins), see run log for fixed-in versions.", ""]
              return out

          def render_sarif(path, limit=25):
              d = load(path)
              if not d:
                  return ["\u26A0\uFE0F Scan produced no output. Check the step log (auth/enablement error or no supported files)."]
              run = (d.get("runs") or [{}])[0]
              rules = {r.get("id"): (r.get("shortDescription") or {}).get("text") or r.get("id")
                       for r in ((run.get("tool") or {}).get("driver") or {}).get("rules", [])}
              results = run.get("results") or []
              if not results:
                  return ["\u2705 No findings."]
              by_sev = {}
              for r in results:
                  by_sev.setdefault(LEVEL_TO_SEV.get(r.get("level"), "low"), []).append(r)
              parts = " | ".join(f"{SEV_ICON[s]} {SEV_LABEL[s]}: {len(by_sev[s])}" for s in SEV_ORDER if s in by_sev)
              out = [f"**{len(results)} findings** | {parts}", ""]
              for sev in SEV_ORDER:
                  if sev not in by_sev:
                      continue
                  rows = ["| Issue | Location |", "|---|---|"]
                  for r in by_sev[sev][:limit]:
                      loc = ((r.get("locations") or [{}])[0].get("physicalLocation") or {})
                      uri = (loc.get("artifactLocation") or {}).get("uri", "?")
                      line = (loc.get("region") or {}).get("startLine", "?")
                      rows.append(f"| {rules.get(r.get('ruleId'), r.get('ruleId'))} | `{uri}:{line}` |")
                  if len(by_sev[sev]) > limit:
                      rows += ["", f"...plus {len(by_sev[sev])-limit} more, see the Security tab or run log."]
                  out += details_block(sev, len(by_sev[sev]), rows)
              return out

          def main():
              mode = os.environ.get("RENDER_MODE", "sarif")
              src = os.environ["RENDER_FILE"]
              title = os.environ.get("RENDER_TITLE", "")
              lines = ([f"### {title}", ""] if title else [])
              if os.environ.get("RENDER_EXIT") == "3":
                  lines += ["ℹ️ No supported files for this scan type in the repo, nothing to scan."]
              else:
                  lines += render_sca(src) if mode == "sca" else render_sarif(src)
              lines.append("")
              with open(os.environ.get("RENDER_OUT", "report.md"), "a", encoding="utf-8") as f:
                  f.write("\n".join(lines) + "\n")

          main()
          EOF

      - name: Build ${{ matrix.name }} report (summary + comment body)
        if: always()
        env:
          RENDER_MODE: ${{ matrix.render_mode }}
          RENDER_FILE: ${{ matrix.render_file }}
          RENDER_TITLE: ${{ matrix.title }}
          RENDER_OUT: report.md
          RENDER_EXIT: ${{ steps.scan.outputs.code }}
        run: |
          python3 render.py
          {
            echo "_Merge blocking is enforced by the required Code Scanning check (new findings only)._"
            echo "_Full results: **Security tab → Code scanning**, category \`${{ matrix.category }}\`._"
          } >> report.md
          cat report.md >> "$GITHUB_STEP_SUMMARY"

      - name: PR comment (${{ matrix.name }})
        if: always() && steps.scan.outputs.code != '3'
        uses: marocchino/sticky-pull-request-comment@v3
        with:
          header: snyk-${{ matrix.name }}   # keeps each scan in its own sticky comment
          path: report.md

      - name: Check SARIF exists
        id: sarif
        if: always()
        run: |
          if [ -f "${{ matrix.sarif }}" ]; then echo "found=true" >> "$GITHUB_OUTPUT";
          else echo "found=false" >> "$GITHUB_OUTPUT"; echo "No SARIF for ${{ matrix.name }} (no supported files)."; fi

      - name: Upload ${{ matrix.name }} to Code Scanning
        if: always() && steps.sarif.outputs.found == 'true'
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: ${{ matrix.sarif }}
          category: ${{ matrix.category }}   # keep each product in its own category
