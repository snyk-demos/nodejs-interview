name: Snyk Main
# Default branch only: the one place anything reaches the Snyk platform, and
# the only home of the container scan (build -> test -> push -> monitor).
# No severity thresholds here: the platform records everything.
on:
  push:
    branches: [ main ]
  workflow_dispatch: {}
permissions:
  contents: read
  packages: write   # push image to GHCR
concurrency:
  group: snyk-main
  cancel-in-progress: false   # don't interrupt a run mid-push
env:
  SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
  SNYK_CFG_ORG: ${{ secrets.SNYK_ORG }}
  # --remote-repo-url pins every project below to this repo target
  REPO_URL: ${{ github.server_url }}/${{ github.repository }}
jobs:
  monitor:
    name: Scan and monitor
    runs-on: ubuntu-latest
    steps:
      # ghcr.io/<owner>/<repo>, lowercased (Docker rejects uppercase).
      # Set the IMAGE_NAME repo variable only if shipping outside GHCR.
      - name: Resolve image name
        id: img
        env:
          OVERRIDE: ${{ vars.IMAGE_NAME }}
        run: |
          name="${OVERRIDE:-ghcr.io/${GITHUB_REPOSITORY}}"
          echo "name=${name,,}" >> "$GITHUB_OUTPUT"

      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: 'npm'
      - run: npm install -g snyk@${{ vars.SNYK_CLI_VERSION || 'latest' }}
      - run: npm install --ignore-scripts   # snyk test needs node_modules

      # Exit codes: 0 clean, 1 findings, 2 error, 3 nothing to scan.
      # Findings never fail this workflow; it records, the PR workflow judges.
      - name: SCA test
        id: sca
        continue-on-error: true
        run: |
          set +e
          snyk test --json-file-output=sca.json
          echo "code=$?" >> "$GITHUB_OUTPUT"
          exit 0

      # Snapshot the dependency tree for continuous alerting.
      # --project-name matches SCM-style naming instead of "goof" from the manifest.
      - name: SCA monitor
        continue-on-error: true
        run: |
          snyk monitor \
            --project-name="package.json" \
            --remote-repo-url="$REPO_URL" \
            --target-reference="${{ github.ref_name }}"

      # Code and IaC have no monitor verb; --report is the equivalent and
      # combines with the file output, so one run tests and persists.
      # --report needs the token to hold View Project Ignores.
      - name: SAST test and report
        id: sast
        continue-on-error: true
        run: |
          set +e
          snyk code test --report \
            --project-name="Code Scan" \
            --remote-repo-url="$REPO_URL" \
            --target-reference="${{ github.ref_name }}" \
            --sarif-file-output=sast.sarif
          echo "code=$?" >> "$GITHUB_OUTPUT"
          exit 0

      - name: IaC test and report
        id: iac
        continue-on-error: true
        run: |
          set +e
          snyk iac test --report \
            --remote-repo-url="$REPO_URL" \
            --target-reference="${{ github.ref_name }}" \
            --sarif-file-output=iac.sarif
          echo "code=$?" >> "$GITHUB_OUTPUT"
          exit 0

      - name: Build image
        run: docker build -t "${{ steps.img.outputs.name }}:${{ github.sha }}" .

      # --file=Dockerfile adds base-image upgrade advice;
      # --exclude-node-modules: app deps are already covered by the SCA scan
      - name: Container test
        id: container
        continue-on-error: true
        run: |
          set +e
          snyk container test "${{ steps.img.outputs.name }}:${{ github.sha }}" \
            --file=Dockerfile --exclude-node-modules \
            --sarif-file-output=container.sarif
          echo "code=$?" >> "$GITHUB_OUTPUT"
          exit 0

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Push after the scan; skipped if it errored. Tighten to == '0' to make
      # findings block publication.
      - name: Push image
        if: steps.container.outputs.code != '2'
        run: docker push "${{ steps.img.outputs.name }}:${{ github.sha }}"

      # Scan target is image:sha (the shipped artifact); project name is a
      # stable label with no sha and no registry host.
      - name: Container monitor
        continue-on-error: true
        run: |
          snyk container monitor "${{ steps.img.outputs.name }}:${{ github.sha }}" \
            --file=Dockerfile --exclude-node-modules \
            --project-name="Container Image" \
            --remote-repo-url="$REPO_URL" \
            --target-reference="${{ github.ref_name }}"

      - name: Report
        if: always()
        run: |
          render() {
            RENDER_TITLE="$1" RENDER_FILE="$2" RENDER_EXIT="$3" RENDER_OUT=report.md \
              python3 .github/scripts/render.py
          }
          render "Snyk SCA"       sca.json        "${{ steps.sca.outputs.code }}"
          render "Snyk SAST"      sast.sarif      "${{ steps.sast.outputs.code }}"
          render "Snyk IaC"       iac.sarif       "${{ steps.iac.outputs.code }}"
          render "Snyk Container" container.sarif "${{ steps.container.outputs.code }}"
          cat report.md >> "$GITHUB_STEP_SUMMARY"
