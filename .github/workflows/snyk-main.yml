name: Snyk Main
# Default branch only, so this fires on a direct push or on a merge. This is the
# only place anything reaches the Snyk platform, and the only place the
# container scan exists: build -> test -> push -> monitor, so the scan sits
# between build and publish.
#
# No --severity-threshold anywhere here. Feature branches filter to high and
# critical for signal; the platform should hold the full picture.
on:
  push:
    branches: [ main ]
  workflow_dispatch: {}
permissions:
  contents: read
  packages: write   # push the scanned image to GHCR
concurrency:
  group: snyk-main
  # Not cancelled: a run interrupted mid-push can leave a partial upload.
  cancel-in-progress: false
env:
  SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
  SNYK_CFG_ORG: ${{ secrets.SNYK_ORG }}
  # Every project below is pinned to this target, so the four scan types show up
  # as four projects under one repo instead of scattering across targets.
  REPO_URL: ${{ github.server_url }}/${{ github.repository }}
jobs:
  monitor:
    name: Scan and monitor
    runs-on: ubuntu-latest
    steps:
      # Derived from repo metadata: ghcr.io/<owner>/<repo>. Set the IMAGE_NAME
      # repo variable ONLY if this artifact ships somewhere other than GHCR.
      # Lowercased because the Docker reference grammar rejects uppercase.
      - name: Resolve image name
        id: img
        env:
          OVERRIDE: ${{ vars.IMAGE_NAME }}
        run: |
          name="${OVERRIDE:-ghcr.io/${GITHUB_REPOSITORY}}"
          echo "name=${name,,}" >> "$GITHUB_OUTPUT"
          echo "Image: ${name,,}"

      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: 'npm'
      # Pin via the SNYK_CLI_VERSION repo variable for reproducible runs.
      - run: npm install -g snyk@${{ vars.SNYK_CLI_VERSION || 'latest' }}
      - run: npm install --ignore-scripts

      # --- Open source -----------------------------------------------------
      # test and monitor are separate commands: test produces the findings file,
      # monitor snapshots the dependency tree for continuous alerting.
      # --project-name "package.json" matches SCM naming, not "goof".
      - name: SCA test
        id: sca
        continue-on-error: true
        run: |
          set +e
          snyk test --json-file-output=sca.json
          echo "code=$?" >> "$GITHUB_OUTPUT"
          exit 0

      - name: SCA monitor
        continue-on-error: true
        run: |
          snyk monitor \
            --project-name="package.json" \
            --remote-repo-url="$REPO_URL" \
            --target-reference="${{ github.ref_name }}"

      # --- Code and IaC ----------------------------------------------------
      # Neither has a `monitor` verb; --report is the equivalent. It combines
      # with --sarif-file-output, so one invocation both writes the local
      # findings file and persists the project, rather than scanning twice.
      # --report requires the token to hold View Project Ignores.
      - name: SAST test and report
        id: sast
        continue-on-error: true
        run: |
          set +e
          snyk code test --report \
            --project-name="Code Scan" \
            --remote-repo-url="$REPO_URL" \
            --target-reference="${{ github.ref_name }}" \
            --sarif-file-output=sast.sarif
          echo "code=$?" >> "$GITHUB_OUTPUT"
          exit 0

      - name: IaC test and report
        id: iac
        continue-on-error: true
        run: |
          set +e
          snyk iac test --report \
            --remote-repo-url="$REPO_URL" \
            --target-reference="${{ github.ref_name }}" \
            --sarif-file-output=iac.sarif
          echo "code=$?" >> "$GITHUB_OUTPUT"
          exit 0

      # --- Container -------------------------------------------------------
      - name: Build image
        run: docker build -t "${{ steps.img.outputs.name }}:${{ github.sha }}" .

      - name: Container test
        id: container
        continue-on-error: true
        run: |
          set +e
          snyk container test "${{ steps.img.outputs.name }}:${{ github.sha }}" \
            --file=Dockerfile --exclude-node-modules \
            --sarif-file-output=container.sarif
          echo "code=$?" >> "$GITHUB_OUTPUT"
          exit 0

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Only if the scan actually ran. Tighten to `== '0'` to make findings
      # block publication; on this deliberately vulnerable repo that would mean
      # never publishing.
      - name: Push image
        if: steps.container.outputs.code != '2'
        run: docker push "${{ steps.img.outputs.name }}:${{ github.sha }}"

      # Scan target is image:sha, the immutable artifact that shipped. Project
      # name is a stable label and holds neither the sha (one project per
      # commit) nor the registry host (a move to ECR would orphan the project).
      - name: Container monitor
        continue-on-error: true
        run: |
          snyk container monitor "${{ steps.img.outputs.name }}:${{ github.sha }}" \
            --file=Dockerfile --exclude-node-modules \
            --project-name="Container Image" \
            --remote-repo-url="$REPO_URL" \
            --target-reference="${{ github.ref_name }}"

      # Summary only. There is no PR to decorate on the default branch.
      - name: Report
        if: always()
        run: |
          render() {
            RENDER_TITLE="$1" RENDER_FILE="$2" RENDER_EXIT="$3" RENDER_OUT=report.md \
              python3 .github/scripts/render.py
          }
          render "Snyk SCA"       sca.json        "${{ steps.sca.outputs.code }}"
          render "Snyk SAST"      sast.sarif      "${{ steps.sast.outputs.code }}"
          render "Snyk IaC"       iac.sarif       "${{ steps.iac.outputs.code }}"
          render "Snyk Container" container.sarif "${{ steps.container.outputs.code }}"
          cat report.md >> "$GITHUB_STEP_SUMMARY"
