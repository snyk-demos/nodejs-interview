name: Snyk Scans
# Drop-in caller for the Snyk scan templates. Two triggers, no double runs:
#   - push: every push to a feature branch runs SCA, Code, and IaC, advisory,
#     with sticky PR comments (IaC included). A push to the default branch runs
#     only the container scan (the image never exists in Git, so the Snyk SCM
#     integration cannot cover it) and snapshots the image with monitor.
#   - pull_request (opened/reopened/ready_for_review only): covers the gap
#     where the branch was pushed before the PR existed, so the sticky comments
#     appear as soon as the PR opens. synchronize is excluded on purpose: a
#     push to a branch with an open PR already runs once via the push event.
# Replace YOUR-ORG/snyk-scan-templates and pin a tag.
on:
  push:
  pull_request:
    types: [opened, reopened, ready_for_review]

permissions:
  contents: read
  pull-requests: write   # sticky PR comments

concurrency:
  group: snyk-${{ github.event_name }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  sca:
    name: SCA
    # push to any non-default branch, or a same-repo PR opening.
    # Fork PRs are excluded: they run without secrets, the scan cannot work.
    if: >
      (github.event_name == 'push' && github.ref_name != github.event.repository.default_branch) ||
      (github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: 'npm'
      - run: npm install --ignore-scripts   # snyk test needs resolved deps
      - uses: snyk-demos/snyk-scan-templates/sca@v1
        with:
          snyk-token: ${{ secrets.SNYK_TOKEN }}
          # fail-on-findings: "true"        # flip when this check should fail
          # severity-threshold: critical    # what "fail" means, per scan
          # extra-args: "--all-projects"    # monorepos

  code:
    name: Code
    if: >
      (github.event_name == 'push' && github.ref_name != github.event.repository.default_branch) ||
      (github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: snyk-demos/snyk-scan-templates/code@v1
        with:
          snyk-token: ${{ secrets.SNYK_TOKEN }}

  iac:
    name: IaC
    if: >
      (github.event_name == 'push' && github.ref_name != github.event.repository.default_branch) ||
      (github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: snyk-demos/snyk-scan-templates/iac@v1
        with:
          snyk-token: ${{ secrets.SNYK_TOKEN }}
          # pr-comment defaults to "true": IaC results land on the open PR
          # as a sticky comment and in the run summary.

  # Default-branch pushes only: build the release image, scan it, and snapshot
  # it to the Snyk platform for ongoing tracking against new disclosures.
  container:
    name: Container
    if: github.event_name == 'push' && github.ref_name == github.event.repository.default_branch
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: docker build -t local/app:${{ github.sha }} .
      - uses: snyk-demos/snyk-scan-templates/container@v1
        with:
          snyk-token: ${{ secrets.SNYK_TOKEN }}
          image: local/app:${{ github.sha }}
          pr-comment: "false"               # default-branch push has no PR
          monitor: "true"                   # track this image in Snyk
          project-name: app                 # stable name, no sha or registry
          target-reference: ${{ github.ref_name }}
