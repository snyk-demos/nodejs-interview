name: Snyk PR
# All branches except main. Three parallel jobs (SCA, SAST, IaC), each with its
# own pass/fail check and its own sticky PR comment; fails on high/critical or
# a scan error. Nothing goes to the Snyk platform. (New-issues-only gating is
# the platform PR check's native job; this pipeline does not re-implement it.)
# Push-triggered (not pull_request) so an open PR doesn't run everything twice.
on:
  push:
    branches-ignore: [ main ]
  workflow_dispatch: {}
permissions:
  contents: read
  pull-requests: write   # sticky PR comments
concurrency:
  group: snyk-pr-${{ github.ref }}
  cancel-in-progress: true
env:
  SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
  SNYK_CFG_ORG: ${{ secrets.SNYK_ORG }}
jobs:
  sca:
    name: SCA
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: 'npm'
      - run: npm install -g snyk@${{ vars.SNYK_CLI_VERSION || 'latest' }}
      - run: npm install --ignore-scripts   # snyk test needs node_modules
      - uses: ./.github/actions/snyk-scan
        with:
          scan-name: SCA
          scan-cmd: snyk test
          output-flag: --json-file-output
          results-file: sca.json
          marker: snyk-sca

  sast:
    name: SAST
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: 'npm'
      - run: npm install -g snyk@${{ vars.SNYK_CLI_VERSION || 'latest' }}
      - uses: ./.github/actions/snyk-scan
        with:
          scan-name: SAST
          scan-cmd: snyk code test
          output-flag: --sarif-file-output
          results-file: sast.sarif
          marker: snyk-sast

  iac:
    name: IaC
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: 'npm'
      - run: npm install -g snyk@${{ vars.SNYK_CLI_VERSION || 'latest' }}
      - uses: ./.github/actions/snyk-scan
        with:
          scan-name: IaC
          scan-cmd: snyk iac test
          output-flag: --sarif-file-output
          results-file: iac.sarif
          marker: snyk-iac
