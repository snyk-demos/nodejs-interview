name: Snyk PR
# Feature branches only. Runs SAST, SCA and IaC, then decorates: one step
# summary and one sticky PR comment covering all three. Nothing here reaches
# the Snyk platform and nothing here blocks a merge.
#
# Push-triggered rather than pull_request: a branch with an open PR would fire
# both events and run everything twice. The SCM integration owns PR blocking.
on:
  push:
    branches-ignore: [ main ]   # literal default branch; snyk-main.yml owns it
  workflow_dispatch: {}
permissions:
  contents: read
  pull-requests: write   # upsert the sticky PR comment
concurrency:
  group: snyk-pr-${{ github.ref }}
  cancel-in-progress: true
env:
  SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
  SNYK_CFG_ORG: ${{ secrets.SNYK_ORG }}
jobs:
  scan:
    name: Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: 'npm'
      # Pin via the SNYK_CLI_VERSION repo variable for reproducible runs.
      - run: npm install -g snyk@${{ vars.SNYK_CLI_VERSION || 'latest' }}
      - run: npm install --ignore-scripts

      # exit codes: 0 clean, 1 findings, 2 error, 3 nothing to scan.
      # continue-on-error everywhere: findings never fail a feature branch, and
      # one broken scan must not hide the other two.
      # --severity-threshold=high keeps the PR comment signal-heavy. The default
      # branch drops it, because the platform should record everything.
      - name: SCA test
        id: sca
        continue-on-error: true
        run: |
          set +e
          snyk test --severity-threshold=high --json-file-output=sca.json
          echo "code=$?" >> "$GITHUB_OUTPUT"
          exit 0

      - name: SAST test
        id: sast
        continue-on-error: true
        run: |
          set +e
          snyk code test --severity-threshold=high --sarif-file-output=sast.sarif
          echo "code=$?" >> "$GITHUB_OUTPUT"
          exit 0

      - name: IaC test
        id: iac
        continue-on-error: true
        run: |
          set +e
          snyk iac test --severity-threshold=high --sarif-file-output=iac.sarif
          echo "code=$?" >> "$GITHUB_OUTPUT"
          exit 0

      # One report for all three, then a single sticky comment keyed on a hidden
      # marker so re-pushes edit in place instead of stacking new comments.
      # Nothing here is error-tolerant on purpose: a swallowed gh failure is
      # indistinguishable from "no PR open", which makes a missing comment
      # impossible to debug.
      - name: Report
        if: always()
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
          MARK: <!-- snyk-pr -->
        run: |
          render() {
            RENDER_TITLE="$1" RENDER_FILE="$2" RENDER_EXIT="$3" RENDER_OUT=report.md \
              python3 .github/scripts/render.py
          }
          render "Snyk SCA (high/critical only)"  sca.json   "${{ steps.sca.outputs.code }}"
          render "Snyk SAST (high/critical only)" sast.sarif "${{ steps.sast.outputs.code }}"
          render "Snyk IaC (high/critical only)"  iac.sarif  "${{ steps.iac.outputs.code }}"
          cat report.md >> "$GITHUB_STEP_SUMMARY"

          echo "Branch: $GITHUB_REF_NAME"
          pr=$(gh pr list --head "$GITHUB_REF_NAME" --state open --json number --jq '.[0].number // empty')
          if [ -z "$pr" ]; then
            echo "::notice::No open PR with head $GITHUB_REF_NAME. Summary written, no comment posted."
            exit 0
          fi
          echo "Decorating PR #$pr"

          # Truncate to GitHub's comment ceiling without splitting a multibyte
          # character: a byte-level cut can tear an emoji and the API rejects
          # invalid UTF-8. (iconv -c also exits 1 on the torn tail, which under
          # bash -e would kill this step, hence python.)
          { echo "$MARK"
            python3 -c "import sys; sys.stdout.write(open('report.md','rb').read()[:60000].decode('utf-8','ignore'))"
          } > comment.md
          # per_page=100 rather than --paginate: with --paginate the --jq filter
          # runs once per page and emits one result per page, not one overall.
          id=$(gh api "repos/${GH_REPO}/issues/${pr}/comments?per_page=100" \
                 --jq "[.[] | select((.body // \"\") | startswith(\"$MARK\"))] | .[0].id // empty")
          if [ -n "$id" ]; then
            echo "Updating existing comment $id"
            gh api -X PATCH "repos/${GH_REPO}/issues/comments/${id}" -F body=@comment.md > /dev/null
          else
            echo "Creating new comment"
            gh api "repos/${GH_REPO}/issues/${pr}/comments" -F body=@comment.md > /dev/null
          fi

      # Red X on findings, by severity: --severity-threshold=high above means
      # exit 1 happens only for high and critical, so anything lower stays green.
      # This does not block a merge. Blocking is a branch protection decision:
      # leave "Scan" out of the required status checks and the X is advisory.
      - name: Fail on high or critical
        if: always()
        env:
          SCA: ${{ steps.sca.outputs.code }}
          SAST: ${{ steps.sast.outputs.code }}
          IAC: ${{ steps.iac.outputs.code }}
        run: |
          fail=0
          for pair in "SCA:$SCA" "SAST:$SAST" "IaC:$IAC"; do
            name="${pair%%:*}"; code="${pair##*:}"
            case "$code" in
              1) echo "::error::$name found high or critical issues."; fail=1 ;;
              2) echo "::error::$name scan errored, results are incomplete."; fail=1 ;;
              *) echo "$name: clean or nothing to scan (exit ${code:-?})." ;;
            esac
          done
          exit "$fail"

