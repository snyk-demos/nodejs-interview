name: Snyk
# Baseline: pushes to protected branches. Uploads SARIF baselines for PR
# diffing, refreshes Snyk platform monitors, scans the built image.
on:
  push:
    branches: [ main, 'release/**' ]
  workflow_dispatch: {}
permissions:
  contents: read
  security-events: write   # SARIF upload
  # actions: read          # needed for PRIVATE repos
concurrency:
  group: snyk-baseline-${{ github.ref }}
  cancel-in-progress: false
env:
  SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
  SNYK_CFG_ORG: ${{ secrets.SNYK_ORG }}   # pins org for every command; same secret in all 3 workflows
  # repo=<name> tag relates deps/code/container projects across targets
  SNYK_TAGS: managed-by=github-actions,repo=${{ github.event.repository.name }}
  SNYK_ATTRS: >-
    --project-environment=backend
    --project-lifecycle=production
    --project-business-criticality=high
jobs:
  baseline:
    name: Baseline Refresh
    runs-on: ubuntu-latest
    steps:
      # IMAGE_NAME = real image coordinates (repo var), fallback repo name.
      # Fixed at first monitor; renaming later creates an orphan project.
      - name: Set image name
        run: |
          IMAGE='${{ vars.IMAGE_NAME }}'
          [ -z "$IMAGE" ] && IMAGE="${GITHUB_REPOSITORY#*/}"
          echo "IMAGE_NAME=${IMAGE,,}" >> "$GITHUB_ENV"
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: 'npm'
      - run: npm install -g snyk
      # IaC runs before npm install so snyk iac doesn't parse node_modules
      - name: IaC
        continue-on-error: true
        run: >
          snyk iac test --sarif-file-output=snyk-iac.sarif
          --report
          --remote-repo-url=${{ github.server_url }}/${{ github.repository }}
          --target-reference=${{ github.ref_name }}
          || true
      - run: npm install --ignore-scripts
      - name: SCA
        continue-on-error: true
        run: snyk test --sarif-file-output=snyk-sca.sarif
      - name: SAST
        continue-on-error: true
        run: snyk code test --sarif-file-output=snyk-code.sarif
      # --report publishes SAST to the platform; needs View Project Ignores
      # permission on the token role. No || true so a 403 is visible.
      - name: SAST report to platform
        continue-on-error: true
        run: >
          snyk code test --report
          --project-name=code-analysis
          --target-name=${{ github.repository }}
          --remote-repo-url=${{ github.server_url }}/${{ github.repository }}
          --target-reference=${{ github.ref_name }}
          --project-tags="$SNYK_TAGS"
      - name: Upload SCA baseline
        if: hashFiles('snyk-sca.sarif') != ''
        uses: github/codeql-action/upload-sarif@v3
        with: { sarif_file: snyk-sca.sarif, category: snyk-sca }
      - name: Upload SAST baseline
        if: hashFiles('snyk-code.sarif') != ''
        uses: github/codeql-action/upload-sarif@v3
        with: { sarif_file: snyk-code.sarif, category: snyk-code }
      - name: Upload IaC baseline
        if: hashFiles('snyk-iac.sarif') != ''
        uses: github/codeql-action/upload-sarif@v3
        with: { sarif_file: snyk-iac.sarif, category: snyk-iac }
      # --target-reference keeps main and release/* histories separate.
      # Skip this step if the repo is SCM-imported (duplicate projects).
      - name: Snyk monitor (deps baseline)
        run: >
          snyk monitor --all-projects
          --remote-repo-url=${{ github.server_url }}/${{ github.repository }}
          --target-reference=${{ github.ref_name }}
          $SNYK_ATTRS
          --project-tags="$SNYK_TAGS"
          || true
      - name: Build image
        run: docker build -t "$IMAGE_NAME:${{ github.sha }}" .
      # container monitor has no --remote-repo-url; linkage = org + branch
      # reference + repo tag. --project-name must be stable (no sha).
      # --exclude-node-modules drops in-image node_modules sub-projects.
      - name: Snyk Container test + monitor
        continue-on-error: true
        run: |
          snyk container test "$IMAGE_NAME:${{ github.sha }}" --file=Dockerfile --exclude-node-modules --severity-threshold=high --sarif-file-output=snyk-container.sarif || true
          snyk container monitor "$IMAGE_NAME:${{ github.sha }}" \
            --file=Dockerfile \
            --exclude-node-modules \
            --project-name="$IMAGE_NAME" \
            --target-reference=${{ github.ref_name }} \
            $SNYK_ATTRS \
            --project-tags="$SNYK_TAGS"
      - name: Upload container baseline
        if: hashFiles('snyk-container.sarif') != ''
        uses: github/codeql-action/upload-sarif@v3
        with: { sarif_file: snyk-container.sarif, category: snyk-container }
      - name: Baseline summary
        if: always()
        run: |
          python3 - << 'EOF' >> "$GITHUB_STEP_SUMMARY"
          import json, os
          scans = [("SCA", "snyk-sca.sarif"), ("SAST", "snyk-code.sarif"),
                   ("IaC", "snyk-iac.sarif"), ("Container", "snyk-container.sarif")]
          print("## \U0001F4CC Snyk baseline refresh")
          print("_This run sets the comparison baseline for future PR gates (Code Scanning categories below)._\n")
          print("| Scan | Findings in SARIF | Status |")
          print("|---|---|---|")
          for name, path in scans:
              if os.path.isfile(path) and os.path.getsize(path) > 0:
                  try:
                      with open(path) as f:
                          d = json.load(f)
                      n = len((d.get("runs") or [{}])[0].get("results") or [])
                      print(f"| {name} | {n} | \u2705 uploaded as `snyk-{name.lower()}` |")
                  except Exception:
                      print(f"| {name} | ? | \u26A0\uFE0F SARIF unreadable, check log |")
              else:
                  print(f"| {name} | - | \u26A0\uFE0F no output (scan failed or nothing to scan) |")
          EOF
