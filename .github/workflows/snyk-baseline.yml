name: Snyk
# Fires ONLY on pushes to a protected branch, plus manual runs.
#
# Sets the baseline Code Scanning compares future PRs against, refreshes the
# Snyk monitor, and scans the built image since that's something the platform
# can't see on its own.
#
# No PR decoration here (there is no PR), but the job summary gets a compact
# table of what was scanned and uploaded so the run is auditable at a glance.
on:
  push:
    branches: [ main, 'release/**' ]
  workflow_dispatch: {}
permissions:
  contents: read
  security-events: write   # needed to upload SARIF to Code Scanning
  # actions: read          # uncomment for PRIVATE repos, upload fails without it
concurrency:
  group: snyk-baseline-${{ github.ref }}
  cancel-in-progress: false   # never cancel a baseline, it must complete
env:
  SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
  # Pin the Snyk org for EVERY command (test, code test, monitor, container).
  # Without this, projects land in the token's default org, and snyk code test
  # 403s if Snyk Code isn't enabled there. Set SNYK_ORG as a repo variable
  # (org slug from https://app.snyk.io/org/<slug>).
  SNYK_CFG_ORG: ${{ secrets.SNYK_ORG }}
jobs:
  baseline:
    name: Baseline Refresh
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: 'npm'
      - run: npm install -g snyk
      # IaC runs BEFORE npm install: with node_modules present, snyk iac tries
      # to parse fixture/tsconfig JSON inside dependencies and fails with
      # SNYK-CLI-0012 parse errors (as seen in previous runs).
      - name: IaC
        continue-on-error: true
        run: snyk iac test --sarif-file-output=snyk-iac.sarif || true
      - run: npm install --ignore-scripts
      # Full scans, SARIF out, then upload. This is what becomes the new
      # baseline for PR diffs.
      - name: SCA
        continue-on-error: true
        run: snyk test --sarif-file-output=snyk-sca.sarif
      - name: SAST
        continue-on-error: true
        run: snyk code test --sarif-file-output=snyk-code.sarif
      - name: Upload SCA baseline
        if: hashFiles('snyk-sca.sarif') != ''
        uses: github/codeql-action/upload-sarif@v3
        with: { sarif_file: snyk-sca.sarif, category: snyk-sca }
      - name: Upload SAST baseline
        if: hashFiles('snyk-code.sarif') != ''
        uses: github/codeql-action/upload-sarif@v3
        with: { sarif_file: snyk-code.sarif, category: snyk-code }
      - name: Upload IaC baseline
        if: hashFiles('snyk-iac.sarif') != ''
        uses: github/codeql-action/upload-sarif@v3
        with: { sarif_file: snyk-iac.sarif, category: snyk-iac }
      # Refreshes the Snyk platform monitor. Skip this if the repo is already
      # SCM-imported on the platform side, otherwise you end up with a
      # duplicate project.
      # --remote-repo-url groups all detected projects under one target in the
      # Snyk UI. --target-reference tags the snapshot with the branch, so main
      # and release/* keep separate histories instead of overwriting each other.
      - name: Snyk monitor (deps baseline)
        run: >
          snyk monitor --all-projects
          --remote-repo-url=${{ github.server_url }}/${{ github.repository }}
          --target-reference=${{ github.ref_name }}
          || true
      - name: Build image
        run: docker build -t nova-bank-goof:${{ github.sha }} .
      # Container pairing: --remote-repo-url is NOT supported on container
      # monitor, so linkage to the repo's Snyk projects happens via the org
      # plus --target-reference (same branch ref as snyk monitor above).
      # --project-name MUST be stable: without it the project name defaults to
      # image:tag, and a per-SHA tag would create a brand new Snyk project on
      # every push instead of updating one.
      - name: Snyk Container test + monitor
        continue-on-error: true
        run: |
          snyk container test nova-bank-goof:${{ github.sha }} --file=Dockerfile --severity-threshold=high --sarif-file-output=snyk-container.sarif || true
          snyk container monitor nova-bank-goof:${{ github.sha }} \
            --file=Dockerfile \
            --project-name=nova-bank-goof \
            --target-reference=${{ github.ref_name }}
      - name: Upload container baseline
        if: hashFiles('snyk-container.sarif') != ''
        uses: github/codeql-action/upload-sarif@v3
        with: { sarif_file: snyk-container.sarif, category: snyk-container }
      - name: Baseline summary
        if: always()
        run: |
          python3 - << 'EOF' >> "$GITHUB_STEP_SUMMARY"
          import json, os
          scans = [("SCA", "snyk-sca.sarif"), ("SAST", "snyk-code.sarif"),
                   ("IaC", "snyk-iac.sarif"), ("Container", "snyk-container.sarif")]
          print("## \U0001F4CC Snyk baseline refresh")
          print("_This run sets the comparison baseline for future PR gates (Code Scanning categories below)._\n")
          print("| Scan | Findings in SARIF | Status |")
          print("|---|---|---|")
          for name, path in scans:
              if os.path.isfile(path) and os.path.getsize(path) > 0:
                  try:
                      with open(path) as f:
                          d = json.load(f)
                      n = len((d.get("runs") or [{}])[0].get("results") or [])
                      print(f"| {name} | {n} | \u2705 uploaded as `snyk-{name.lower()}` |")
                  except Exception:
                      print(f"| {name} | ? | \u26A0\uFE0F SARIF unreadable, check log |")
              else:
                  print(f"| {name} | - | \u26A0\uFE0F no output (scan failed or nothing to scan) |")
          EOF
