name: Snyk Container
# Protected-branch pushes: build -> test -> monitor, per Snyk guidance (scan
# after build, before push/deploy). Image coordinates come from repo metadata,
# so nothing has to be configured before the first run.
on:
  push:
    branches: [ main, 'release/**' ]
  workflow_dispatch: {}
permissions:
  contents: read
  checks: write   # publish the results check run
concurrency:
  group: snyk-container-${{ github.ref }}
  cancel-in-progress: false
env:
  SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
  SNYK_CFG_ORG: ${{ secrets.SNYK_ORG }}   # same org secret in all workflows
jobs:
  container:
    name: Container
    runs-on: ubuntu-latest
    steps:
      # Derived from repo metadata: ghcr.io/<owner>/<repo>. Set the IMAGE_NAME
      # repo variable ONLY if this artifact ships somewhere other than GHCR
      # (ECR, Docker Hub, Artifactory). Lowercased because the Docker reference
      # grammar rejects uppercase in the repository path.
      - name: Resolve image name
        id: img
        env:
          OVERRIDE: ${{ vars.IMAGE_NAME }}
        run: |
          name="${OVERRIDE:-ghcr.io/${GITHUB_REPOSITORY}}"
          echo "name=${name,,}" >> "$GITHUB_OUTPUT"
          echo "Image: ${name,,}"

      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 18
      # Pin via the SNYK_CLI_VERSION repo variable for reproducible runs.
      - run: npm install -g snyk@${{ vars.SNYK_CLI_VERSION || 'latest' }}

      - name: Build image
        run: docker build -t "${{ steps.img.outputs.name }}:${{ github.sha }}" .

      # exit codes: 0 clean, 1 findings, 2 error, 3 nothing to scan; only 2 fails
      - name: Container test
        id: scan
        continue-on-error: true
        run: |
          set +e
          snyk container test "${{ steps.img.outputs.name }}:${{ github.sha }}" \
            --file=Dockerfile \
            --exclude-node-modules \
            --severity-threshold=high \
            --sarif-file-output=results.sarif
          code=$?
          echo "code=$code" >> "$GITHUB_OUTPUT"
          if [ "$code" -eq 2 ]; then exit 2; fi
          exit 0

      - name: Report
        if: always()
        env:
          RENDER_TITLE: Snyk Container (high/critical only)
          RENDER_FILE: results.sarif
          RENDER_EXIT: ${{ steps.scan.outputs.code }}
          RENDER_OUT: report.md
        run: |
          python3 .github/scripts/render.py
          cat report.md >> "$GITHUB_STEP_SUMMARY"

      # Check Run "Snyk Container Results": its Details page renders the report
      # directly, no digging through logs. neutral = findings, informational.
      - name: Publish results check
        if: always()
        env:
          GH_TOKEN: ${{ github.token }}
          SCAN_CODE: ${{ steps.scan.outputs.code }}
        run: |
          case "$SCAN_CODE" in
            0|3) conc=success ;;
            2)   conc=failure ;;
            *)   conc=neutral ;;
          esac
          head -c 60000 report.md > check.md
          gh api "repos/${GITHUB_REPOSITORY}/check-runs" \
            -f name="Snyk Container Results" \
            -f head_sha="${GITHUB_SHA}" \
            -f status=completed \
            -f conclusion="$conc" \
            -f "output[title]=Snyk Container Results" \
            -F "output[summary]=@check.md"

      # snyk container monitor: snapshot the image contents to the Snyk UI so
      # newly disclosed base-image and OS-package vulns raise alerts without a
      # rebuild. --project-name is the image path and must stay stable (never
      # the sha tag); --target-reference groups snapshots by branch.
      - name: Container monitor
        continue-on-error: true
        run: |
          snyk container monitor "${{ steps.img.outputs.name }}:${{ github.sha }}" \
            --file=Dockerfile \
            --exclude-node-modules \
            --project-name="${{ steps.img.outputs.name }}" \
            --target-reference="${{ github.ref_name }}"
