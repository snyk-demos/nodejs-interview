name: Snyk IaC
# snyk iac test runs on every branch: decorated, non-blocking feedback via the
# run summary plus a "Snyk IaC Results" check whose Details page shows the
# report. On the default and release branches the scan is re-run with --report,
# which is the IaC equivalent of snyk monitor: it persists findings to the Snyk
# UI as a project. Never pull_request; the SCM integration owns PR diffing.
on:
  push:
    branches: [ '**' ]
  workflow_dispatch: {}
permissions:
  contents: read
  checks: write   # publish the results check run
concurrency:
  group: snyk-iac-${{ github.ref }}
  cancel-in-progress: true
env:
  SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
  SNYK_CFG_ORG: ${{ secrets.SNYK_ORG }}   # same org secret in all workflows
jobs:
  scan:
    name: IaC
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: 'npm'
      # Pin via the SNYK_CLI_VERSION repo variable for reproducible runs.
      - run: npm install -g snyk@${{ vars.SNYK_CLI_VERSION || 'latest' }}

      # exit codes: 0 clean, 1 findings, 2 error, 3 nothing to scan; only 2 fails
      - name: IaC test
        id: scan
        continue-on-error: true
        run: |
          set +e
          snyk iac test --severity-threshold=high --sarif-file-output=results.sarif
          code=$?
          echo "code=$code" >> "$GITHUB_OUTPUT"
          if [ "$code" -eq 2 ]; then exit 2; fi
          exit 0

      - name: Report
        if: always()
        env:
          RENDER_TITLE: Snyk IaC (high/critical only)
          RENDER_FILE: results.sarif
          RENDER_EXIT: ${{ steps.scan.outputs.code }}
          RENDER_OUT: report.md
        run: |
          python3 .github/scripts/render.py
          cat report.md >> "$GITHUB_STEP_SUMMARY"

      # Check Run "Snyk IaC Results": its Details page renders the report
      # directly, no digging through logs. neutral = findings, informational.
      - name: Publish results check
        if: always()
        env:
          GH_TOKEN: ${{ github.token }}
          SCAN_CODE: ${{ steps.scan.outputs.code }}
        run: |
          case "$SCAN_CODE" in
            0|3) conc=success ;;
            2)   conc=failure ;;
            *)   conc=neutral ;;
          esac
          head -c 60000 report.md > check.md
          gh api "repos/${GITHUB_REPOSITORY}/check-runs" \
            -f name="Snyk IaC Results" \
            -f head_sha="${GITHUB_SHA}" \
            -f status=completed \
            -f conclusion="$conc" \
            -f "output[title]=Snyk IaC Results" \
            -F "output[summary]=@check.md"

      # IaC has no `monitor` verb; --report is the equivalent and persists the
      # scan to the Snyk UI. Skipped when the previous step found nothing to
      # scan (exit 3), because --report on an empty repo is a wasted call.
      - name: IaC monitor (--report)
        if: |
          steps.scan.outputs.code != '3' &&
          (github.ref_name == github.event.repository.default_branch || startsWith(github.ref_name, 'release/'))
        continue-on-error: true
        run: |
          snyk iac test --report \
            --remote-repo-url="${{ github.server_url }}/${{ github.repository }}" \
            --target-reference="${{ github.ref_name }}"
