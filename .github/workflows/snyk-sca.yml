name: Snyk SCA
# snyk test runs on every branch: decorated, non-blocking feedback via the run
# summary plus a "Snyk SCA Results" check whose Details page shows the report.
# snyk monitor runs only on the default and release branches, so the Snyk UI
# tracks what actually ships and feature branches don't create project sprawl.
# Never pull_request; the SCM integration owns PR diffing and blocking.
on:
  push:
    branches: [ '**' ]
  workflow_dispatch: {}
permissions:
  contents: read
  checks: write   # publish the results check run
concurrency:
  group: snyk-sca-${{ github.ref }}
  cancel-in-progress: true
env:
  SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
  SNYK_CFG_ORG: ${{ secrets.SNYK_ORG }}   # same org secret in all workflows
jobs:
  scan:
    name: SCA
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: 'npm'
      # Pin via the SNYK_CLI_VERSION repo variable for reproducible runs.
      - run: npm install -g snyk@${{ vars.SNYK_CLI_VERSION || 'latest' }}
      - run: npm install --ignore-scripts

      # exit codes: 0 clean, 1 findings, 2 error, 3 nothing to scan; only 2 fails
      - name: SCA test
        id: scan
        continue-on-error: true
        run: |
          set +e
          snyk test --severity-threshold=high --json-file-output=results.json
          code=$?
          echo "code=$code" >> "$GITHUB_OUTPUT"
          if [ "$code" -eq 2 ]; then exit 2; fi
          exit 0

      - name: Report
        if: always()
        env:
          RENDER_TITLE: Snyk SCA (high/critical only)
          RENDER_FILE: results.json
          RENDER_EXIT: ${{ steps.scan.outputs.code }}
          RENDER_OUT: report.md
        run: |
          python3 .github/scripts/render.py
          cat report.md >> "$GITHUB_STEP_SUMMARY"

      # Check Run "Snyk SCA Results": its Details page renders the report
      # directly, no digging through logs. neutral = findings, informational.
      - name: Publish results check
        if: always()
        env:
          GH_TOKEN: ${{ github.token }}
          SCAN_CODE: ${{ steps.scan.outputs.code }}
        run: |
          case "$SCAN_CODE" in
            0|3) conc=success ;;
            2)   conc=failure ;;
            *)   conc=neutral ;;
          esac
          head -c 60000 report.md > check.md
          gh api "repos/${GITHUB_REPOSITORY}/check-runs" \
            -f name="Snyk SCA Results" \
            -f head_sha="${GITHUB_SHA}" \
            -f status=completed \
            -f conclusion="$conc" \
            -f "output[title]=Snyk SCA Results" \
            -F "output[summary]=@check.md"

      # snyk monitor: snapshot the dependency tree to the Snyk UI for continuous
      # monitoring, so newly disclosed vulns raise alerts without a new commit.
      # No --severity-threshold: monitor should record the full picture.
      # No --project-name: Snyk derives it from the manifest, which keeps the
      # project stable across runs. --target-reference groups snapshots by branch.
      - name: SCA monitor
        if: github.ref_name == github.event.repository.default_branch || startsWith(github.ref_name, 'release/')
        continue-on-error: true
        run: snyk monitor --target-reference="${{ github.ref_name }}"
