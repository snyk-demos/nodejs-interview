name: Snyk
# Fires ONLY on pushes to feature branches. Nothing else triggers this file,
# so PR and baseline runs won't show a skipped job for it in the checks list.
#
# Non-blocking feedback for lower-level branches only. Renders a
# per-tool markdown report into the job summary. No PR decoration here,
# that belongs to the gate workflow. The PR gate is where issues block.
#
# NOTE: the report lives on the workflow run's Summary page (Actions tab ->
# click the run). That is where GITHUB_STEP_SUMMARY renders, by design.
on:
  push:
    branches-ignore: [ main, 'release/**' ]
permissions:
  contents: read          # summary only, nothing else is needed
concurrency:
  group: snyk-quick-${{ github.ref }}
  cancel-in-progress: true
env:
  SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
  # Same org as the baseline workflow, so test results, .snyk policies, and
  # Snyk Code enablement match what the platform projects use.
  SNYK_CFG_ORG: ${{ secrets.SNYK_ORG }}
jobs:
  quick-scan:
    name: Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: 'npm'
      - run: npm install -g snyk

      # IaC runs BEFORE npm install on purpose: with node_modules present,
      # snyk iac tries to parse fixture/tsconfig JSON inside dependencies and
      # spams SNYK-CLI-0012 parse errors.
      - name: IaC Scan
        id: iac
        continue-on-error: true
        run: |
          set +e
          snyk iac test --severity-threshold=high --sarif-file-output=iac.sarif
          code=$?
          echo "code=$code" >> "$GITHUB_OUTPUT"
          if [ "$code" -eq 2 ]; then exit 2; fi
          exit 0

      - run: npm install --ignore-scripts

      - name: SCA Scan
        id: sca
        continue-on-error: true
        run: |
          set +e
          snyk test --severity-threshold=high --json-file-output=sca.json
          code=$?
          echo "code=$code" >> "$GITHUB_OUTPUT"
          if [ "$code" -eq 2 ]; then exit 2; fi
          exit 0

      - name: SAST Scan
        id: sast
        continue-on-error: true
        run: |
          set +e
          snyk code test --severity-threshold=high --sarif-file-output=code.sarif
          code=$?
          echo "code=$code" >> "$GITHUB_OUTPUT"
          if [ "$code" -eq 2 ]; then exit 2; fi
          exit 0

      - name: Write report renderer
        if: always()
        run: |
          cat > render.py << 'EOF'
          import json, os

          SEV_ORDER = ["critical", "high", "medium", "low"]
          SEV_ICON = {"critical": "\U0001F6A8", "high": "\U0001F534", "medium": "\U0001F7E0", "low": "\U0001F7E1"}
          SEV_LABEL = {"critical": "Critical", "high": "High", "medium": "Medium", "low": "Low"}
          LEVEL_TO_SEV = {"error": "high", "warning": "medium", "note": "low"}
          OPEN_BY_DEFAULT = {"critical", "high"}

          def load(path):
              try:
                  with open(path) as f:
                      d = json.load(f)
                  return d[0] if isinstance(d, list) and d else d
              except Exception:
                  return None

          def details_block(sev, count, table_lines):
              open_attr = " open" if sev in OPEN_BY_DEFAULT else ""
              out = [f"<details{open_attr}>", f"<summary>{SEV_ICON[sev]} <b>{SEV_LABEL[sev]}</b>: {count} issue(s)</summary>", ""]
              out += table_lines
              out += ["", "</details>", ""]
              return out

          def render_sca(path):
              d = load(path)
              if not d:
                  return ["\u26A0\uFE0F Scan produced no output. Check the step log (auth error or unsupported project)."]
              vulns = d.get("vulnerabilities") or []
              if not vulns:
                  return ["\u2705 No high/critical dependency issues."]
              uniq = {}
              for v in vulns:
                  uniq.setdefault(v.get("id"), v)
              by_sev = {}
              for v in uniq.values():
                  by_sev.setdefault(v.get("severity", "low"), []).append(v)
              parts = " | ".join(f"{SEV_ICON[s]} {SEV_LABEL[s]}: {len(by_sev[s])}" for s in SEV_ORDER if s in by_sev)
              out = [f"**{len(uniq)} unique issues across {len(vulns)} vulnerable paths** | {parts}", ""]
              for sev in SEV_ORDER:
                  if sev not in by_sev:
                      continue
                  rows = ["| Issue | Package | Fixed in |", "|---|---|---|"]
                  for v in sorted(by_sev[sev], key=lambda x: x.get("packageName", "")):
                      fixed = ", ".join((v.get("fixedIn") or [])[:3]) or "-"
                      rows.append(f"| {v.get('title','?')} | `{v.get('packageName','?')}@{v.get('version','?')}` | `{fixed}` |")
                  out += details_block(sev, len(by_sev[sev]), rows)
              upgrades = (d.get("remediation") or {}).get("upgrade") or {}
              if upgrades:
                  rows = ["| Upgrade | To | Fixes |", "|---|---|---|"]
                  ranked = sorted(upgrades.items(), key=lambda kv: -len(kv[1].get("vulns", [])))
                  for pkg, info in ranked[:10]:
                      rows.append(f"| `{pkg}` | `{info.get('upgradeTo','?')}` | {len(info.get('vulns', []))} issues |")
                  if len(ranked) > 10:
                      rows += ["", f"...plus {len(ranked)-10} more upgrades, see the run log."]
                  out += ["<details open>", "<summary>\U0001F527 <b>Top fixes by impact</b> (bump these first)</summary>", ""]
                  out += rows + ["", "</details>", ""]
              unresolved = (d.get("remediation") or {}).get("unresolved") or []
              if unresolved:
                  out += [f"\u26A0\uFE0F {len(unresolved)} issues have **no direct upgrade** (transitive pins), see run log for fixed-in versions.", ""]
              return out

          def render_sarif(path, limit=25):
              d = load(path)
              if not d:
                  return ["\u26A0\uFE0F Scan produced no output. Check the step log (auth/enablement error or no supported files)."]
              run = (d.get("runs") or [{}])[0]
              rules = {r.get("id"): (r.get("shortDescription") or {}).get("text") or r.get("id")
                       for r in ((run.get("tool") or {}).get("driver") or {}).get("rules", [])}
              results = run.get("results") or []
              if not results:
                  return ["\u2705 No findings."]
              by_sev = {}
              for r in results:
                  by_sev.setdefault(LEVEL_TO_SEV.get(r.get("level"), "low"), []).append(r)
              parts = " | ".join(f"{SEV_ICON[s]} {SEV_LABEL[s]}: {len(by_sev[s])}" for s in SEV_ORDER if s in by_sev)
              out = [f"**{len(results)} findings** | {parts}", ""]
              for sev in SEV_ORDER:
                  if sev not in by_sev:
                      continue
                  rows = ["| Issue | Location |", "|---|---|"]
                  for r in by_sev[sev][:limit]:
                      loc = ((r.get("locations") or [{}])[0].get("physicalLocation") or {})
                      uri = (loc.get("artifactLocation") or {}).get("uri", "?")
                      line = (loc.get("region") or {}).get("startLine", "?")
                      rows.append(f"| {rules.get(r.get('ruleId'), r.get('ruleId'))} | `{uri}:{line}` |")
                  if len(by_sev[sev]) > limit:
                      rows += ["", f"...plus {len(by_sev[sev])-limit} more, see the run log."]
                  out += details_block(sev, len(by_sev[sev]), rows)
              return out

          def main():
              mode = os.environ.get("RENDER_MODE", "sarif")
              src = os.environ["RENDER_FILE"]
              title = os.environ.get("RENDER_TITLE", "")
              lines = ([f"### {title}", ""] if title else [])
              if os.environ.get("RENDER_EXIT") == "3":
                  lines += ["ℹ️ No supported files for this scan type in the repo, nothing to scan."]
              else:
                  lines += render_sca(src) if mode == "sca" else render_sarif(src)
              lines.append("")
              with open(os.environ.get("RENDER_OUT", "report.md"), "a", encoding="utf-8") as f:
                  f.write("\n".join(lines) + "\n")

          main()
          EOF

      - name: Build scan report
        if: always()
        run: |
          {
            echo "## Snyk scan (high/critical only)"
            echo "_Fast, non-blocking feedback on \`${GITHUB_REF_NAME}\`. The PR gate is where issues block._"
            echo ""
          } > report.md
          RENDER_EXIT="${{ steps.sca.outputs.code }}"  RENDER_MODE=sca   RENDER_FILE=sca.json   RENDER_TITLE="SCA (open-source dependencies)" python3 render.py
          RENDER_EXIT="${{ steps.sast.outputs.code }}" RENDER_MODE=sarif RENDER_FILE=code.sarif RENDER_TITLE="SAST (Snyk Code)"               python3 render.py
          RENDER_EXIT="${{ steps.iac.outputs.code }}"  RENDER_MODE=sarif RENDER_FILE=iac.sarif  RENDER_TITLE="IaC"                            python3 render.py
          cat report.md >> "$GITHUB_STEP_SUMMARY"
