name: Snyk Differential Scan

# Use this instead of Snyk's native PR check, running both will cause double results.
#
# What runs when:
#   - push to a feature branch -> quick scan, doesn't block anything
#   - PR into main/release -> the real gate, see below
#   - push to main/release -> full scan, refreshes the baseline and monitor,
#     scans the container image
#
# How the gating actually works: Every scan runs with continue-on-error and uploads its SARIF.
# GitHub Code Scanning is what diffs new findings against what's already
# known for the branch, and it's the code-scanning check 
# that actually blocks the merge. Same mechanism for SCA, SAST,
# and IaC, so no snyk-delta and no baseline files to track.

on:
  push:
    branches: [ '**' ]
  pull_request:
    branches: [ main, 'release/**' ]
  workflow_dispatch: {}

permissions:
  contents: read
  security-events: write   # needed to upload SARIF to Code Scanning

concurrency:
  group: snyk-diff-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

env:
  SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}

jobs:
  # Fast, non-blocking feedback for feature branches. Dumps results into the
  # job summary so devs don't have to dig through logs.
  quick-scan:
    name: Quick scan (feature branch)
    if: github.event_name == 'push' && github.ref != 'refs/heads/main' && !startsWith(github.ref, 'refs/heads/release/')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: 'npm'
      - run: npm install --ignore-scripts
      - run: npm install -g snyk

      - name: Quick SCA + SAST + IaC (high/critical, non-blocking)
        run: |
          echo "## Snyk quick scan" >> "$GITHUB_STEP_SUMMARY"
          echo "Fast feedback only. The PR gate is where issues block." >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          snyk test        --severity-threshold=high 2>&1 | tee -a "$GITHUB_STEP_SUMMARY" || true
          snyk code test   --severity-threshold=high 2>&1 | tee -a "$GITHUB_STEP_SUMMARY" || true
          snyk iac test    --severity-threshold=high 2>&1 | tee -a "$GITHUB_STEP_SUMMARY" || true
          echo '```' >> "$GITHUB_STEP_SUMMARY"

  # This is the actual gate. SCA, SAST, and IaC run in parallel, each one
  # uploads its own SARIF under its own category. Code Scanning only shows
  # NEW alerts on a PR, and branch protection requiring that check is what
  # blocks the merge.
  differential:
    name: Differential ${{ matrix.name }}
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: SCA
            command: snyk test
            sarif: snyk-sca.sarif
            category: snyk-sca
            needs_deps: true
          - name: SAST
            command: snyk code test
            sarif: snyk-code.sarif
            category: snyk-code
            needs_deps: false
          - name: IaC
            command: snyk iac test
            sarif: snyk-iac.sarif
            category: snyk-iac
            needs_deps: false
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: 'npm'
      - name: Install dependencies (SCA only)
        if: matrix.needs_deps
        run: npm install --ignore-scripts
      - run: npm install -g snyk

      # continue-on-error so findings (non-zero exit) don't skip the upload
      # step. The SARIF output includes every severity, since Code Scanning
      # needs the full picture to tell new from existing. The actual
      # high/critical gate lives in the repo's code scanning config, not here.
      - name: Scan ${{ matrix.name }}
        continue-on-error: true
        run: ${{ matrix.command }} --sarif-file-output=${{ matrix.sarif }}

      # Not every product produces a file, IaC on a repo with no IaC files
      # for example, so check before trying to upload.
      - name: Check SARIF exists
        id: sarif
        run: |
          if [ -f "${{ matrix.sarif }}" ]; then echo "found=true" >> "$GITHUB_OUTPUT";
          else echo "found=false" >> "$GITHUB_OUTPUT"; echo "No SARIF for ${{ matrix.name }} (no supported files)."; fi

      - name: Upload ${{ matrix.name }} to Code Scanning
        if: steps.sarif.outputs.found == 'true'
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: ${{ matrix.sarif }}
          category: ${{ matrix.category }}   # keep each product in its own category

  # Runs on push to a protected branch. Sets the baseline Code Scanning
  # compares future PRs against, refreshes the Snyk monitor, and scans the
  # built image since that's something the platform can't see on its own.
  baseline:
    name: Baseline (protected branch)
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/heads/release/'))
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: 'npm'
      - run: npm install --ignore-scripts
      - run: npm install -g snyk

      # Full scans, SARIF out, then upload. This is what becomes the new
      # baseline for PR diffs.
      - name: SCA
        continue-on-error: true
        run: snyk test --sarif-file-output=snyk-sca.sarif
      - name: SAST
        continue-on-error: true
        run: snyk code test --sarif-file-output=snyk-code.sarif
      - name: IaC
        continue-on-error: true
        run: snyk iac test --sarif-file-output=snyk-iac.sarif || true
      - name: Upload SCA baseline
        if: hashFiles('snyk-sca.sarif') != ''
        uses: github/codeql-action/upload-sarif@v3
        with: { sarif_file: snyk-sca.sarif, category: snyk-sca }
      - name: Upload SAST baseline
        if: hashFiles('snyk-code.sarif') != ''
        uses: github/codeql-action/upload-sarif@v3
        with: { sarif_file: snyk-code.sarif, category: snyk-code }
      - name: Upload IaC baseline
        if: hashFiles('snyk-iac.sarif') != ''
        uses: github/codeql-action/upload-sarif@v3
        with: { sarif_file: snyk-iac.sarif, category: snyk-iac }

      # Refreshes the Snyk platform monitor. Skip this if the repo is already
      # SCM-imported on the platform side, otherwise you end up with a
      # duplicate project.
      - name: Snyk monitor (code + deps baseline)
        run: snyk monitor --all-projects --remote-repo-url=${{ github.server_url }}/${{ github.repository }} || true

      - name: Build image
        run: docker build -t nova-bank-goof:${{ github.sha }} .
      - name: Snyk Container test + monitor
        continue-on-error: true
        run: |
          snyk container test    nova-bank-goof:${{ github.sha }} --file=Dockerfile --severity-threshold=high --sarif-file-output=snyk-container.sarif || true
          snyk container monitor nova-bank-goof:${{ github.sha }} --file=Dockerfile
      - name: Upload container baseline
        if: hashFiles('snyk-container.sarif') != ''
        uses: github/codeql-action/upload-sarif@v3
        with: { sarif_file: snyk-container.sarif, category: snyk-container }
