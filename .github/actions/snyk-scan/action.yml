name: Snyk scan
description: >
  Run one Snyk scan, write the report to the run summary, upsert a per-scan
  sticky PR comment, and fail the job on high/critical findings or a scan error.

inputs:
  scan-name:
    description: Display name, e.g. SCA / SAST / IaC.
    required: true
  scan-cmd:
    description: Snyk command, e.g. "snyk test" or "snyk code test".
    required: true
  output-flag:
    description: --json-file-output or --sarif-file-output.
    required: true
  results-file:
    description: Results filename, e.g. sca.json / sast.sarif.
    required: true
  marker:
    description: Sticky-comment slug, e.g. snyk-sca.
    required: true

runs:
  using: composite
  steps:
    # Exit codes: 0 clean, 1 findings, 2 error, 3 nothing to scan.
    # --severity-threshold=high: exit 1 only for high/critical.
    - name: Scan
      id: scan
      shell: bash
      run: |
        set +e
        ${{ inputs.scan-cmd }} --severity-threshold=high ${{ inputs.output-flag }}="${{ inputs.results-file }}"
        echo "code=$?" >> "$GITHUB_OUTPUT"
        exit 0

    # Report to the run summary, then upsert one sticky PR comment keyed on the
    # hidden marker so re-pushes edit it in place instead of stacking.
    - name: Report and comment
      if: always()
      shell: bash
      env:
        GH_TOKEN: ${{ github.token }}
        GH_REPO: ${{ github.repository }}
        MARK: <!-- ${{ inputs.marker }} -->
      run: |
        RENDER_TITLE="Snyk ${{ inputs.scan-name }} (high/critical only)" \
        RENDER_FILE="${{ inputs.results-file }}" \
        RENDER_EXIT="${{ steps.scan.outputs.code }}" \
        RENDER_OUT=report.md \
          python3 "${GITHUB_ACTION_PATH}/../../scripts/render.py"
        cat report.md >> "$GITHUB_STEP_SUMMARY"

        pr=$(gh pr list --head "$GITHUB_REF_NAME" --state open --json number --jq '.[0].number // empty')
        if [ -z "$pr" ]; then
          echo "::notice::No open PR with head $GITHUB_REF_NAME. Summary only."
          exit 0
        fi
        # byte-safe truncation: a raw cut can tear an emoji into invalid UTF-8
        { echo "$MARK"
          python3 -c "import sys; sys.stdout.write(open('report.md','rb').read()[:60000].decode('utf-8','ignore'))"
        } > comment.md
        id=$(gh api "repos/${GH_REPO}/issues/${pr}/comments?per_page=100" \
               --jq "[.[] | select((.body // \"\") | startswith(\"$MARK\"))] | .[0].id // empty")
        if [ -n "$id" ]; then
          gh api -X PATCH "repos/${GH_REPO}/issues/comments/${id}" -F body=@comment.md > /dev/null
        else
          gh api "repos/${GH_REPO}/issues/${pr}/comments" -F body=@comment.md > /dev/null
        fi

    # Red X on findings (1) or a broken scan (2). Advisory unless this check
    # is added to required status checks in branch protection.
    - name: Fail on high or critical
      if: always()
      shell: bash
      run: |
        case "${{ steps.scan.outputs.code }}" in
          1) echo "::error::${{ inputs.scan-name }} found high or critical issues."; exit 1 ;;
          2) echo "::error::${{ inputs.scan-name }} scan errored, results are incomplete."; exit 1 ;;
          *) echo "${{ inputs.scan-name }}: clean or nothing to scan." ;;
        esac
